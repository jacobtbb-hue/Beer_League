<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Öl-tävlingen 2026</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, sans-serif; background: #f7f6f3; color: #222; min-height: 100vh; }

header { background: #fff; border-bottom: 1px solid #e8e5df; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
header h1 { font-size: 18px; font-weight: 600; }
#status { font-size: 12px; color: #aaa; display: flex; align-items: center; gap: 6px; }
#statusDot { width: 7px; height: 7px; border-radius: 50%; background: #ccc; flex-shrink: 0; }
#statusDot.live { background: #1D9E75; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

main { max-width: 960px; margin: 0 auto; padding: 24px 20px; }

.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 24px; }
.stat-card { background: #fff; border-radius: 10px; padding: 14px 16px; border: 1px solid #e8e5df; }
.stat-card .label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
.stat-card .value { font-size: 22px; font-weight: 600; color: #222; }
.stat-card .sub { font-size: 12px; color: #aaa; margin-top: 2px; }

.chart-card { background: #fff; border-radius: 12px; border: 1px solid #e8e5df; padding: 20px; margin-bottom: 20px; }

#legend { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #555; cursor: pointer; user-select: none; padding: 4px 8px; border-radius: 20px; border: 1px solid #e8e5df; background: #fff; transition: opacity 0.2s; }
.legend-avatar { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; flex-shrink: 0; border: 2px solid transparent; }
.legend-item.dimmed { opacity: 0.3; }

#controls { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
#playBtn { display: flex; align-items: center; gap: 6px; padding: 7px 18px; font-size: 14px; border-radius: 8px; border: 1px solid #ddd; background: #fff; color: #222; cursor: pointer; font-weight: 500; }
#playBtn:hover { background: #f5f5f5; }
#progressWrap { flex: 1; min-width: 120px; }
#progressBar { width: 100%; }
#dateLabel { font-size: 13px; color: #888; min-width: 60px; font-variant-numeric: tabular-nums; }
select { font-size: 13px; padding: 5px 8px; border-radius: 6px; border: 1px solid #ddd; background: #fff; }

.chart-wrap { position: relative; width: 100%; height: 420px; }

#errorMsg { background: #fff3cd; border: 1px solid #ffc107; border-radius: 8px; padding: 12px 16px; font-size: 13px; color: #856404; margin-bottom: 16px; display: none; }

/* ── Podium ── */
.podium-card { background: #fff; border-radius: 12px; border: 1px solid #e8e5df; padding: 20px 20px 24px; margin-bottom: 20px; }
.podium-card h2 { font-size: 13px; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 20px; }
.podium { display: flex; align-items: flex-end; justify-content: center; gap: 12px; height: 180px; }
.podium-slot { display: flex; flex-direction: column; align-items: center; flex: 1; max-width: 140px; }
.podium-avatar-wrap { position: relative; margin-bottom: 8px; }
.podium-avatar { width: 56px; height: 56px; border-radius: 50%; object-fit: cover; border: 3px solid #ccc; display: block; transition: all 0.4s ease; }
.podium-slot.p1 .podium-avatar { width: 68px; height: 68px; border-color: #FFD700; box-shadow: 0 0 0 3px #FFF8DC; }
.podium-slot.p2 .podium-avatar { border-color: #C0C0C0; box-shadow: 0 0 0 3px #f0f0f0; }
.podium-slot.p3 .podium-avatar { border-color: #CD7F32; box-shadow: 0 0 0 3px #fdf3e7; }
.podium-medal { position: absolute; bottom: -4px; right: -4px; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #fff; border: 2px solid #fff; }
.p1 .podium-medal { background: #FFD700; color: #7a5f00; }
.p2 .podium-medal { background: #A8A8A8; }
.p3 .podium-medal { background: #CD7F32; }
.podium-name { font-size: 13px; font-weight: 600; color: #333; margin-bottom: 3px; text-align: center; }
.podium-score { font-size: 12px; color: #999; margin-bottom: 8px; text-align: center; }
.podium-bar-wrap { width: 100%; display: flex; justify-content: center; }
.podium-bar { width: 70%; border-radius: 6px 6px 0 0; transition: height 0.4s ease; }
.p1 .podium-bar { background: linear-gradient(180deg, #FFE566, #FFD700); min-height: 80px; }
.p2 .podium-bar { background: linear-gradient(180deg, #d8d8d8, #C0C0C0); min-height: 55px; }
.p3 .podium-bar { background: linear-gradient(180deg, #dfa060, #CD7F32); min-height: 35px; }
</style>
</head>
<body>

<header>
  <h1>🍺 Öl-tävlingen 2026</h1>
  <div id="status">
    <span id="statusDot"></span>
    <span id="statusText">Laddar...</span>
  </div>
</header>

<main>
  <div id="errorMsg"></div>

  <div class="stats" id="statsRow"></div>

  <div class="chart-card">
    <div id="legend"></div>
    <div id="controls">
      <button id="playBtn">▶ Spela</button>
      <div id="progressWrap"><input type="range" id="progressBar" min="0" max="0" value="0" step="0.01"></div>
      <span id="dateLabel">–</span>
      <select id="speedSelect">
        <option value="700">Långsam</option>
        <option value="350" selected>Normal</option>
        <option value="120">Snabb</option>
      </select>
    </div>
    <div class="chart-wrap"><canvas id="beerChart"></canvas></div>
  </div>

  <div class="podium-card">
    <h2>🏆 Pall</h2>
    <div class="podium" id="podium">
      <div class="podium-slot p2" id="podium-2">
        <div class="podium-avatar-wrap">
          <img class="podium-avatar" id="pa-2" src="" alt="">
          <span class="podium-medal">2</span>
        </div>
        <div class="podium-name" id="pn-2">–</div>
        <div class="podium-score" id="ps-2">–</div>
        <div class="podium-bar-wrap"><div class="podium-bar" id="pb-2" style="height:55px"></div></div>
      </div>
      <div class="podium-slot p1" id="podium-1">
        <div class="podium-avatar-wrap">
          <img class="podium-avatar" id="pa-1" src="" alt="">
          <span class="podium-medal">1</span>
        </div>
        <div class="podium-name" id="pn-1">–</div>
        <div class="podium-score" id="ps-1">–</div>
        <div class="podium-bar-wrap"><div class="podium-bar" id="pb-1" style="height:80px"></div></div>
      </div>
      <div class="podium-slot p3" id="podium-3">
        <div class="podium-avatar-wrap">
          <img class="podium-avatar" id="pa-3" src="" alt="">
          <span class="podium-medal">3</span>
        </div>
        <div class="podium-name" id="pn-3">–</div>
        <div class="podium-score" id="ps-3">–</div>
        <div class="podium-bar-wrap"><div class="podium-bar" id="pb-3" style="height:35px"></div></div>
      </div>
    </div>
  </div>
</main>

// ── CSV parser ──────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split("\n").map(l => l.split(",").map(c => c.trim().replace(/^"|"$/g,"")));
  // Find header row (contains person names)
  let headerIdx = -1;
  for (let i = 0; i < Math.min(5, lines.length); i++) {
    if (lines[i].includes("Adam") || lines[i].includes("Jacob")) { headerIdx = i; break; }
  }
  if (headerIdx === -1) throw new Error("Kunde inte hitta rubrikrad");

  const rows = lines.slice(headerIdx + 1);
  const dates = [];
  const daily = {};
  PERSONS.forEach(p => daily[p] = []);

  // Build today as DD-MM-YYYY for comparison
  const now = new Date();
  const todayStr = String(now.getDate()).padStart(2,"0") + "-" +
                   String(now.getMonth()+1).padStart(2,"0") + "-" +
                   now.getFullYear();
  function dateToNum(d) {
    // d = "DD-MM-YYYY" → sortable number YYYYMMDD
    const [dd,mm,yyyy] = d.split("-");
    return parseInt(yyyy+mm+dd);
  }
  const todayNum = dateToNum(todayStr);

  rows.forEach(row => {
    if (!row[2] || row[2].length < 6) return; // skip empty date rows
    const dateRaw = row[2]; // col C
    if (dateToNum(dateRaw) > todayNum) return; // skip future dates
    dates.push(dateRaw);
    PERSONS.forEach(p => {
      const val = parseFloat(row[PERSON_COLS[p]]) || 0;
      daily[p].push(val);
    });
  });

  // Build cumulative
  const cum = {};
  PERSONS.forEach(p => {
    let c = 0;
    cum[p] = daily[p].map(v => { c += v; return c; });
  });

  return { dates, cum };
}

// ── Stats cards ─────────────────────────────────────────────
function renderStats(dates, cum) {
  const lastIdx = dates.length - 1;
  const totals = PERSONS.map(p => ({ name: p, val: cum[p][lastIdx] }));
  totals.sort((a,b) => b.val - a.val);
  const leader = totals[0];
  const grandTotal = totals.reduce((s,x) => s+x.val, 0);

  const statsEl = document.getElementById("statsRow");
  statsEl.innerHTML = `
    <div class="stat-card">
      <div class="label">Totalt</div>
      <div class="value">${grandTotal}</div>
      <div class="sub">öl druckna</div>
    </div>
    <div class="stat-card">
      <div class="label">Ledare</div>
      <div class="value" style="font-size:17px">${leader.name}</div>
      <div class="sub">${leader.val} öl</div>
    </div>
    <div class="stat-card">
      <div class="label">Dagar</div>
      <div class="value">${dates.length}</div>
      <div class="sub">sedan start</div>
    </div>
    <div class="stat-card">
      <div class="label">Snitt/dag</div>
      <div class="value">${(grandTotal / dates.length).toFixed(1)}</div>
      <div class="sub">öl totalt</div>
    </div>
  `;
}

// ── Chart setup ─────────────────────────────────────────────
let chart = null;

const avatarBubblePlugin = {
  id: "avatarBubble",
  afterDatasetsDraw(chart) {
    const ctx = chart.ctx;
    chart.data.datasets.forEach((ds, i) => {
      if (ds.hidden) return;
      const meta = chart.getDatasetMeta(i);
      if (!meta.visible) return;
      let lastPt = null;
      for (let j = meta.data.length - 1; j >= 0; j--) {
        if (ds.data[j] !== null && ds.data[j] !== undefined) { lastPt = meta.data[j]; break; }
      }
      if (!lastPt) return;
      const { x, y } = lastPt;
      const r = AVATAR_R;
      const img = avatarImgs[ds.label];
      if (!img.complete) return;
      ctx.save();
      ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.closePath();
      ctx.strokeStyle = COLORS[ds.label]; ctx.lineWidth = 3; ctx.stroke();
      ctx.clip();
      ctx.drawImage(img, x-r, y-r, r*2, r*2);
      ctx.restore();
      ctx.save();
      ctx.beginPath(); ctx.arc(x, y, r+2.5, 0, Math.PI*2);
      ctx.strokeStyle = COLORS[ds.label]; ctx.lineWidth = 2; ctx.stroke();
      ctx.restore();
    });
  }
};

function makeData(p, frame) {
  return fullCum[p].map((v,i) => i <= frame ? v : null);
}
function calcYMax(frame) {
  let hi = 0;
  PERSONS.forEach(p => { if (!hiddenState[p] && fullCum[p][frame] > hi) hi = fullCum[p][frame]; });
  return Math.ceil(Math.max(MIN_Y, hi) / Y_STEP) * Y_STEP;
}

function initChart() {
  const maxIdx = allDates.length - 1;
  currentFrame = maxIdx;

  const datasets = PERSONS.map(p => ({
    label: p, data: makeData(p, maxIdx),
    borderColor: COLORS[p], backgroundColor: COLORS[p]+"22",
    borderDash: DASHES[p], borderWidth: 2.5,
    pointRadius: 0, pointHoverRadius: 0,
    tension: 0.3, fill: false, spanGaps: false,
  }));

  if (chart) { chart.destroy(); }

  chart = new Chart(document.getElementById("beerChart"), {
    type: "line",
    data: { labels: allDates, datasets },
    plugins: [avatarBubblePlugin],
    options: {
      responsive: true, maintainAspectRatio: false,
      animation: { duration: 180 },
      layout: { padding: { right: 30, top: 28 } },
      interaction: { mode: "index", intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          filter: item => item.parsed.y !== null,
          callbacks: {
            title: ctx => "Datum: " + ctx[0].label,
            label: ctx => " " + ctx.dataset.label + ": " + ctx.parsed.y + " öl"
          }
        }
      },
      scales: {
        x: { ticks: { autoSkip: true, maxTicksLimit: 12, maxRotation: 45, font:{size:11}, color:"#aaa" }, grid: { color:"rgba(0,0,0,0.06)" } },
        y: { min: 0, max: calcYMax(maxIdx), title: { display: true, text: "Kumulativt antal öl", font:{size:11}, color:"#aaa" }, ticks: { stepSize: Y_STEP, color:"#aaa", font:{size:11} }, grid: { color:"rgba(0,0,0,0.06)" } }
      }
    }
  });

  firstReached = buildFirstReached(fullCum, allDates);

  const bar = document.getElementById("progressBar");
  bar.max   = maxIdx;
  bar.value = maxIdx;
  playhead  = maxIdx;
  document.getElementById("dateLabel").textContent = allDates[maxIdx];
  buildLegend();
  renderPodium(maxIdx);
}

// ── Continuous RAF animation system ──────────────────────────
// playhead is a float: e.g. 3.7 = 70% of the way from day 3 to day 4
// This gives perfectly smooth interpolation with no per-day pauses.
let playhead  = 0;
let rafId     = null;
let lastTs    = null;
let isPlaying = false;

// days/second based on speed selector (700ms/day = slow, 120ms/day = fast)
function getDaysPerSec() { return 1000 / parseInt(document.getElementById("speedSelect").value); }

// Linearly interpolate value for person p at float playhead pos
function getVal(p, pos) {
  const maxI = allDates.length - 1;
  const i    = Math.floor(pos);
  const frac = pos - i;
  if (i >= maxI) return fullCum[p][maxI];
  if (i < 0)     return fullCum[p][0];
  return fullCum[p][i] + (fullCum[p][i + 1] - fullCum[p][i]) * frac;
}

function calcYMaxAtPos(pos) {
  let hi = 0;
  PERSONS.forEach(p => { if (!hiddenState[p]) { const v = getVal(p, pos); if (v > hi) hi = v; } });
  return Math.ceil(Math.max(MIN_Y, hi) / Y_STEP) * Y_STEP;
}

function drawAtPos(pos) {
  const maxI = allDates.length - 1;
  const clamp = Math.min(Math.max(pos, 0), maxI);
  const fi    = Math.floor(clamp);

  // All days up to fi are exact, fi+1 is the interpolated tip, rest null
  chart.data.datasets.forEach(ds => {
    const p = ds.label;
    ds.data = allDates.map((_, i) => {
      if (i < fi)  return fullCum[p][i];
      if (i === fi) return getVal(p, clamp);
      return null;
    });
  });

  chart.options.scales.y.max = calcYMaxAtPos(clamp);
  chart.update("none");

  // Show the nearest date label
  const labelIdx = clamp - fi > 0.5 && fi < maxI ? fi + 1 : fi;
  document.getElementById("dateLabel").textContent = allDates[labelIdx];
  document.getElementById("progressBar").value = clamp;
  currentFrame = fi;

  renderPodium(Math.round(clamp));
}

function animLoop(ts) {
  if (!lastTs) lastTs = ts;
  const dt = (ts - lastTs) / 1000;
  lastTs = ts;

  playhead += dt * getDaysPerSec();

  const maxI = allDates.length - 1;
  if (playhead >= maxI) {
    playhead = maxI;
    drawAtPos(playhead);
    stopPlay();
    return;
  }

  drawAtPos(playhead);
  rafId = requestAnimationFrame(animLoop);
}

function startPlay() {
  if (playhead >= allDates.length - 1) { playhead = 0; drawAtPos(0); }
  isPlaying = true; playing = true; lastTs = null;
  document.getElementById("playBtn").textContent = "⏸ Pausa";
  rafId = requestAnimationFrame(animLoop);
}

function stopPlay() {
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  isPlaying = false; playing = false; lastTs = null;
  document.getElementById("playBtn").textContent = "▶ Spela";
}

function updateChart(frame) {
  stopPlay();
  playhead = frame;
  drawAtPos(frame);
}

// ── Legend ───────────────────────────────────────────────────
function buildLegend() {
  const el = document.getElementById("legend");
  el.innerHTML = "";
  PERSONS.forEach(p => {
    const item = document.createElement("span");
    item.className = "legend-item" + (hiddenState[p] ? " dimmed" : "");
    item.innerHTML = `<img class="legend-avatar" src="${avatarData[p]}" alt="${p}" style="border-color:${COLORS[p]}"><span>${p}</span>`;
    item.addEventListener("click", () => {
      hiddenState[p] = !hiddenState[p];
      const ds = chart.data.datasets.find(d => d.label === p);
      ds.hidden = hiddenState[p];
      item.classList.toggle("dimmed", hiddenState[p]);
      chart.options.scales.y.max = calcYMax(currentFrame);
      chart.update("none");
    });
    el.appendChild(item);
  });
}

// ── Podium ───────────────────────────────────────────────────
// firstReached[p][score] = frame index when p first reached that score
// We precompute for tie-breaking: earlier frame = wins tie
function buildFirstReached(cum, dates) {
  const first = {};
  PERSONS.forEach(p => {
    first[p] = {};
    cum[p].forEach((v, i) => {
      if (!(v in first[p])) first[p][v] = i;
    });
  });
  return first;
}
let firstReached = {};

function renderPodium(frame) {
  const scores = PERSONS.map(p => ({
    name: p,
    val: fullCum[p][frame],
    firstAt: firstReached[p] ? (firstReached[p][fullCum[p][frame]] ?? frame) : frame
  }));

  // Sort: highest val first, tie-break by firstAt (lower = earlier = wins)
  scores.sort((a, b) => b.val - a.val || a.firstAt - b.firstAt);

  const top3 = scores.slice(0, 3);
  const maxVal = top3[0].val || 1;

  // Slot order on screen: 2nd, 1st, 3rd
  const slots = [
    { slot: 1, rank: 1, data: top3[0] },
    { slot: 2, rank: 2, data: top3[1] },
    { slot: 3, rank: 3, data: top3[2] },
  ];

  const barHeights = { 1: 80, 2: 55, 3: 35 };

  slots.forEach(({ rank, data }) => {
    if (!data) return;
    document.getElementById(`pa-${rank}`).src = avatarData[data.name] || "";
    document.getElementById(`pa-${rank}`).alt = data.name;
    document.getElementById(`pn-${rank}`).textContent = data.name;
    document.getElementById(`ps-${rank}`).textContent = data.val + " öl";
    // Scale bar height proportionally to score, min = base height
    const base = barHeights[rank];
    const scaled = data.val > 0 ? Math.max(base, Math.round((data.val / maxVal) * 100)) : base;
    document.getElementById(`pb-${rank}`).style.height = scaled + "px";
    // Color avatar border to person color
    document.getElementById(`pa-${rank}`).style.borderColor = COLORS[data.name];
  });
}


document.getElementById("playBtn").addEventListener("click", () => isPlaying ? stopPlay() : startPlay());
document.getElementById("progressBar").addEventListener("input", e => {
  stopPlay();
  playhead = parseFloat(e.target.value);
  drawAtPos(playhead);
});

// ── Data fetching ────────────────────────────────────────────
async function fetchData() {
  const dot = document.getElementById("statusDot");
  const txt = document.getElementById("statusText");
  const err = document.getElementById("errorMsg");
  try {
    const res = await fetch(CSV_URL + "&t=" + Date.now()); // cache-bust
    if (!res.ok) throw new Error("HTTP " + res.status);
    const text = await res.text();
    const parsed = parseCSV(text);
    allDates = parsed.dates;
    fullCum  = parsed.cum;

    renderStats(allDates, fullCum);
    initChart();

    dot.className = "live";
    const now = new Date();
    txt.textContent = "Uppdaterad " + now.getHours().toString().padStart(2,"0") + ":" + now.getMinutes().toString().padStart(2,"0");
    err.style.display = "none";
  } catch(e) {
    dot.className = "";
    txt.textContent = "Kunde inte hämta data";
    err.style.display = "block";
    err.textContent = "⚠️ Kunde inte ladda data från Google Sheets. Försöker igen om 5 minuter. (" + e.message + ")";
    console.error(e);
  }
}

// ── Polling ──────────────────────────────────────────────────
async function pollData() {
  // On refresh, keep current frame position if data count unchanged
  const prevLen = allDates.length;
  const dot = document.getElementById("statusDot");
  const txt = document.getElementById("statusText");
  try {
    const res = await fetch(CSV_URL + "&t=" + Date.now());
    if (!res.ok) throw new Error("HTTP " + res.status);
    const text = await res.text();
    const parsed = parseCSV(text);

    const newLen = parsed.dates.length;
    allDates = parsed.dates;
    fullCum  = parsed.cum;

    renderStats(allDates, fullCum);

    // If new rows added and user is at the end, advance to latest
    const wasAtEnd = currentFrame >= prevLen - 1;
    document.getElementById("progressBar").max = newLen - 1;
    if (wasAtEnd) updateChart(newLen - 1);
    else chart.update("none");

    dot.className = "live";
    const now = new Date();
    txt.textContent = "Uppdaterad " + now.getHours().toString().padStart(2,"0") + ":" + now.getMinutes().toString().padStart(2,"0");
  } catch(e) {
    dot.className = "";
    txt.textContent = "Uppdatering misslyckades";
  }
}

fetchData();
setInterval(pollData, POLL_INTERVAL);
</script>
